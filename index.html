<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link href="/favicon.ico" rel="icon shortcut">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Noto+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <title>PRIME CORE</title>
  <meta name="description" content="PRIME CORE — Official Store" />
  <meta name="author" content="PRIME CORE" />

  <meta property="og:title" content="PRIME CORE" />
  <meta property="og:description" content="PRIME CORE Official Store" />
  <meta property="og:image" content="/favicon.ico" />
</head>

<body>
  <div id="root">
    <div id="app-boot-fallback" style="min-height:100dvh;display:flex;align-items:center;justify-content:center;background:#fff;color:#1f2937;font-family:Roboto,Arial,sans-serif;padding:24px;text-align:center;">
      <img src="/splash-logo.png" alt="PRIME CORE" style="max-width:min(78vw,560px);width:100%;height:auto;display:block;object-fit:contain;" />
    </div>
  </div>
  <script>
    window.addEventListener('error', function (event) {
      var fallback = document.getElementById('app-boot-fallback');
      if (fallback) {
        fallback.innerHTML = '<div><img src="/splash-logo.png" alt="PRIME CORE" style="max-width:min(78vw,560px);width:100%;height:auto;display:block;object-fit:contain;margin:0 auto 18px;" /><div style="font-size:16px;font-weight:700;margin-bottom:8px;">App failed to start</div><div style="font-size:12px;color:#6b7280;">' + String(event.message || 'Unknown error') + '</div></div>';
      }
    });
  </script>
  <!-- IMPORTANT: DO NOT REMOVE THIS SCRIPT TAG OR THIS VERY COMMENT! -->
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
